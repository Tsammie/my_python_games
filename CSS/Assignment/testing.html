<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="login-container">
    <form class="login-box">
      <div class="logo">
        <img src="https://cdn-icons-png.flaticon.com/128/9152/9152673.png" alt="Logo" />
      </div>
      <h2>Login</h2>

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="e.g. howard.thurman@gmail.com" required />

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" required />

      <button type="submit" class="login-button">Log In</button>

      <div class="divider">or</div>

      <button class="google-button">
        <img src="https://th.bing.com/th/id/R.0dd54f853a1bffb0e9979f8146268af3?rik=qTQlRtQRV5AliQ&riu=http%3a%2f%2fpluspng.com%2fimg-png%2fgoogle-logo-png-google-logo-icon-png-transparent-background-1000.png&ehk=VlcCHZ7jyV%2fCI7dZfbUl8Qb9%2f7uibkF6I6MBoqTtpRU%3d&risl=&pid=ImgRaw&r=0" alt="Google Logo" />
        Continue with Google
      </button>
    </form>
  </div>
</body>
</html>
