<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mountains+of+Christmas:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .serif{
            font-family: 'Times New Roman', Times, serif;
            font-size: 80px;
        }
        .san{
            font-family: Arial, Helvetica, sans-serif;
            font-size: 80px;
        }
        .mono{ 
            font-family: 'Courier New', Courier, monospace;
            font-size: 80px;
        }
        .cursive{
            font-family: cursive;
            font-size: 80px;
        }
        .fantasy{
            font-family: "Mountains of Christmas", serif;
            font-size: 80px;
        }
    </style>
    <link rel="stylesheet"
     href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"/>
     
</head>
<body>
    <h1 class="serif"> <span class="material-symbols-outlined">
        favorite
        </span>Serif</h1>
    <h1 class="san"> <span class="material-symbols-outlined">
        searcH
        </span>San serif</h1>
    <h1 class="mono"> <span class="material-symbols-outlined">
        cancel
        </span>Monospace</h1>
    <h1 class="cursive"> <span class="material-symbols-outlined">
        login
        </span>Cursive</h1>
    <h1 class="fantasy"> <span class="material-symbols-outlined">
        bolt
        </span>Fantasy</h1>
</body>
</html>
