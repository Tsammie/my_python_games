<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box:hover{
            transform: translate(1600px, 600px);
            transition-duration: 20s;
            transition-property: transform;
        }
        .box{
            width:80px;
            height: 80px;
            background-color: purple;
            /* justify-content: center;
            margin: auto; */
            transform: translate();
        }
        .box2{width:80px;
            height: 80px;
            background-color: purple;
            /* justify-content: center;
            margin: auto; */
            transform: translate();
            transform: rotate(60deg);

        }
        .box3{width:80px;
            height: 80px;
            background-color: purple;
            /* justify-content: center;
            margin: auto; */
            transform:skew(50deg);

        }
        .box4{width:80px;
            height: 80px;
            background-color: purple;
            /* justify-content: center;
            margin: auto; */
            transform:rotate();

        }
        
    </style>
</head>
<body>
    <div class="box"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
</body>
</html>
